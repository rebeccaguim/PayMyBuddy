<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Profil - Pay My Buddy</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<nav class="navbar">

    <div class="navbar-left">
        <span class="navbar-logo">Pay My Buddy</span>
    </div>

    <div class="navbar-right">
        <a href="/transfer">Transferts</a>
        <a href="/profile">Profil</a>
        <a href="/connection">Ajouter une relation</a>
        <a href="/logout">Déconnexion</a>
    </div>

</nav>

<div class="profile-container">

    <form class="profile-form" method="post" action="/profile">

        <div class="profile-row">
            <label for="username">Nom d'utilisateur</label>
            <input
                    type="text"
                    id="username"
                    name="username"
                    class="form-input"
                    th:value="${user.username}"
                    aria-label="Nom d'utilisateur"
                    required>
        </div>

        <div class="profile-row">
            <label for="email">E-mail</label>
            <input
                    type="email"
                    id="email"
                    name="email"
                    class="form-input"
                    th:value="${user.email}"
                    aria-label="Adresse e-mail"
                    required>
        </div>

        <div class="profile-row">
            <label for="password">Mot de passe</label>
            <input
                    type="password"
                    id="password"
                    name="password"
                    class="form-input"
                    placeholder="Nouveau mot de passe"
                    aria-label="Nouveau mot de passe">
        </div>

        <button type="submit" class="orange-button">
            Modifier
        </button>

    </form>

</div>

</body>

</html>
