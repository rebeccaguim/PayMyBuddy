<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Ajouter une relation - Pay My Buddy</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<nav class="navbar">

    <div class="navbar-left">
        <span class="navbar-logo">Pay My Buddy</span>
    </div>

    <div class="navbar-right">
        <a href="/transfer">Transferts</a>
        <a href="/profile">Profil</a>
        <a href="/connection">Ajouter une relation</a>
        <a href="/logout">Déconnexion</a>
    </div>

</nav>

<div class="connection-container">

    <form class="connection-form" method="post" action="/connection">

        <label for="email">
            Rechercher une relation
        </label>

        <div class="connection-input-row">

            <input
                    type="email"
                    id="email"
                    name="email"
                    class="form-input connection-input"
                    placeholder="Entrer une adresse e-mail"
                    aria-label="Adresse e-mail de la relation"
                    required>

            <button type="submit" class="orange-button">
                Ajouter
            </button>

        </div>

    </form>

</div>

</body>

</html>
