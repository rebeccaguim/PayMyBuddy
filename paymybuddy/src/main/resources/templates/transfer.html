<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Transfer - Pay My Buddy</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<nav class="navbar">

    <div class="navbar-left">
        <span class="navbar-logo">Pay My Buddy</span>
    </div>

    <div class="navbar-right">
        <a href="/transfer">Transfer</a>
        <a href="#">Profile</a>
        <a href="/connection">Add connection</a>
        <a href="/logout">Log out</a>
    </div>

</nav>

<div class="transfer-container">

    <form class="transfer-form" method="post" action="/transfer">

        <select class="form-input" name="receiverId" required>
            <option value="">Select a connection</option>

            <option
                    th:each="connection : ${connections}"
                    th:value="${connection.friend.id}"
                    th:text="${connection.friend.username}">
                Friend name
            </option>
        </select>

        <input
                type="text"
                name="description"
                class="form-input"
                placeholder="Description"
                required>

        <input
                type="number"
                name="amount"
                class="form-input amount-input"
                placeholder="0€"
                step="0.01"
                min="0.01"
                required>

        <button type="submit" class="form-button">
            Pay
        </button>

    </form>

    <div class="transactions-card">

        <h3>My Transactions</h3>

        <table class="transactions-table">

            <thead>
            <tr>
                <th>Connections</th>
                <th>Description</th>
                <th>Amount</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="transaction : ${transactions}">
                <td th:text="${transaction.receiver.username}">Connection</td>
                <td th:text="${transaction.description}">Description</td>
                <td>
                    <span th:text="${transaction.amount}">0</span>€
                </td>
            </tr>
            </tbody>

        </table>

    </div>

</div>

</body>

</html>
